server {
    listen 80;
    server_name 40.127.15.76;

    # Django Static Files
    location /django-static/ {
        alias /home/azureuser/milkman/milkman/staticfiles/;
    }

    # Django Media Files
    location /media/ {
        alias /home/azureuser/milkman/milkman/media/;
    }

    # Django API and Admin
    location ~ ^/(product|customer|subscription|staff|category|django-admin)/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Express Frontend Server
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
