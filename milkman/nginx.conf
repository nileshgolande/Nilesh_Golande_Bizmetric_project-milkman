server {
    listen 80;
    server_name 40.127.15.76;

    # Django Static Files
    location /django-static/ {
        alias /home/azureuser/milkman/milkman/staticfiles/;
    }

    # Django Media Files
    location /media/ {
        alias /home/azureuser/milkman/milkman/media/;
    }

    # Django API and Admin
    location ~ ^/(product|customer|subscription|staff|category|django-admin)/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React Frontend (Vite Dev Server) as the main page
    location / {
        proxy_pass http://127.0.0.1:5173/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
