server {
    listen 80;
    server_name 40.127.15.76;

    # Django Static Files
    location /django-static/ {
        alias /home/azureuser/milkman/milkman/staticfiles/;
    }

    # Django Media Files
    location /media/ {
        alias /home/azureuser/milkman/milkman/media/;
    }

    # Django API and Admin (Port 8000)
    location ~ ^/(api|product|customer|subscription|staff|category|admin|django-admin)/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # React Frontend (Static Build serving)
    location / {
        root /home/azureuser/milkman/frontend/frontendfile/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
