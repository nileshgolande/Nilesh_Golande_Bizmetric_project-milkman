name: Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            cd ~/milkman
            git fetch origin
            git reset --hard origin/main

            # 2. Django Setup (Backend in milkman/)
            cd milkman/milkman
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r ../requirements.txt gunicorn
            python3 manage.py migrate
            python3 manage.py collectstatic --noinput
            deactivate
            cd ../..

            # 3. React Frontend (frontend/frontendfile)
            cd frontend/frontendfile
            npm install
            VITE_API_BASE_URL="http://milkmanautoapi.duckdns.org" npm run build
            cd ../..

            # 4. Restart Django service using PM2
            cd milkman
            pm2 restart ecosystem.config.js || pm2 start ecosystem.config.js
            pm2 save

            # 5. Reload Nginx (if config changed)
            sudo cp ~/milkman/milkman/nginx.conf /etc/nginx/sites-available/milkman
            sudo ln -sf /etc/nginx/sites-available/milkman /etc/nginx/sites-enabled/
            sudo nginx -t && sudo systemctl reload nginx
